# yaml-language-server: $schema=https://raw.githubusercontent.com/mostlygeek/llama-swap/refs/heads/main/config-schema.json
# ==============================================================================
# GLOBAL ENGINE CONFIGURATION
# ==============================================================================
host: "127.0.0.1"
port: 8080
globalTTL: 60
includeAliasesInList: true
healthCheckTimeout: 600

# ==============================================================================
# MACROS & ENVIRONMENT ALIASES
# ==============================================================================
macros:
  llama-server: "llama-server.exe --port ${PORT}"
  default_ctx: 4096
  default_ctk: q8_0
  default_ctv: q8_0
  default_fa: on
  default_args: "--ctx-size ${default_ctx} -ctk ${default_ctk} -ctv ${default_ctv} -fa ${default_fa}"

# ==============================================================================
# INFERENCE ROUTINGS & BACKENDS
# ==============================================================================
models:

# --- GEMMA 4 12B IT (MTP) ---
  gemma4-12b:
    name: "Unsloth Gemma 4 12B IT (MTP)"
    description: "unsloth/gemma-4-12b-it-qat-GGUF:UD-Q4_K_XL"
    capabilities:
      in:
        - text
        - audio
        - image
      out: ["text"]
      tools: true
      context: 65536
    macros:
      default_ctx: 65536
    cmd: |
      ${llama-server}
      ${default_args}
      -hf unsloth/gemma-4-12b-it-qat-GGUF:UD-Q4_K_XL
      --spec-type draft-mtp
      --spec-draft-n-max 2
      --no-mmproj-offload
    filters:
      setParamsByID:
        "${MODEL_ID}:no_think":
          chat_template_kwargs:
            enable_thinking: false

# --- GEMMA 4 12B CODER FABLE/COMPOSER ---
